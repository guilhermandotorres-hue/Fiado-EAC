<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caderneta de Fiado</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      margin-top: 20px;
    }
    .logo {
      display: block;
      margin: 10px auto;
      width: 150px;
      max-width: 50%;
    }
    .container {
      max-width: 600px;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      padding: 10px 15px;
      margin: 5px 5px 5px 0;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-adicionar { background-color: #6EC1E4; color: #fff; }
    .btn-adicionar:hover { background-color: #4DA3D5; }
    .btn-exportar { background-color: #4CAF50; color: #fff; }
    .btn-exportar:hover { background-color: #45A049; }
    .btn-editar { background-color: #FFA500; color: #fff; }
    .btn-apagar { background-color: #E74C3C; color: #fff; }

    .cliente {
      margin: 15px 0;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fafafa;
      word-wrap: break-word;
    }
    .compras {
      margin-top: 10px;
    }
    .item {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      margin: 5px 0;
      background: #eee;
      padding: 5px 10px;
      border-radius: 6px;
    }
    .item span {
      margin-top: 5px;
    }
    .total {
      font-weight: bold;
      margin-top: 10px;
    }
    .item button {
      margin-left: 5px;
      padding: 5px 8px;
      font-size: 0.9em;
    }

    /* Barra de pesquisa e botão Ir para Cliente */
    #pesquisaCliente {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      background-color: #fff; /* cor padrão */
    }

    /* --- Responsividade --- */
    @media (max-width: 480px) {
      .container {
        padding: 15px;
        margin: 15px;
      }
      .logo {
        width: 120px;
      }
      button {
        padding: 8px 12px;
        font-size: 0.9em;
      }
      .item {
        flex-direction: column;
        align-items: flex-start;
      }
      .item span {
        margin-top: 5px;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <img src="Made with insMind-Logo-do-EAC.png" class="logo" alt="Logo EAC">

  <div class="container">
    <h1>Caderneta de Fiado</h1>

    <!-- Cadastro de clientes -->
    <input type="text" id="nomeCliente" placeholder="Nome do cliente">
    <button class="btn-adicionar" onclick="adicionarCliente()">Adicionar Cliente</button>
    <button class="btn-exportar" onclick="exportarExcel()">📊 Exportar para Excel</button>

    <!-- Separação visual entre cadastro e pesquisa -->
    <div style="margin-top: 25px; border-top: 1px solid #ccc; padding-top: 15px;">
      <!-- Barra de pesquisa padrão -->
      <input type="text" id="pesquisaCliente" placeholder="Pesquisar cliente..." oninput="filtrarClientes()">
      <button class="btn-adicionar" style="margin-top: 10px;" onclick="irParaCliente()">Ir para Cliente</button>
    </div>

    <div id="listaClientes"></div>
  </div>

  <script>
    let clientes = [];

    function salvarDados() {
      localStorage.setItem("cadernetaFiado", JSON.stringify(clientes));
    }

    function carregarDados() {
      const dados = localStorage.getItem("cadernetaFiado");
      if (dados) {
        clientes = JSON.parse(dados);
        renderClientes();
      }
    }

    function adicionarCliente() {
      const nome = document.getElementById("nomeCliente").value;
      if (nome.trim() === "") return alert("Digite o nome do cliente!");
      clientes.push({ nome, compras: [] });
      document.getElementById("nomeCliente").value = "";
      salvarDados();
      renderClientes();
    }

    function adicionarCompra(index) {
      const produto = prompt("Produto:");
      const valor = parseFloat(prompt("Valor:"));
      if (!produto || isNaN(valor)) return alert("Dados inválidos!");
      clientes[index].compras.push({ produto, valor });
      salvarDados();
      renderClientes();
    }

    function editarCompra(cIndex, iIndex) {
      const novaDesc = prompt("Novo produto:", clientes[cIndex].compras[iIndex].produto);
      const novoValor = parseFloat(prompt("Novo valor:", clientes[cIndex].compras[iIndex].valor));
      if (!novaDesc || isNaN(novoValor)) return;
      clientes[cIndex].compras[iIndex] = { produto: novaDesc, valor: novoValor };
      salvarDados();
      renderClientes();
    }

    function removerCompra(cIndex, iIndex) {
      clientes[cIndex].compras.splice(iIndex, 1);
      salvarDados();
      renderClientes();
    }

    function editarCliente(cIndex) {
      const novoNome = prompt("Novo nome do cliente:", clientes[cIndex].nome);
      if (!novoNome) return;
      clientes[cIndex].nome = novoNome;
      salvarDados();
      renderClientes();
    }

    function apagarCliente(cIndex) {
      if (confirm("Tem certeza que deseja apagar toda a lista deste cliente?")) {
        clientes.splice(cIndex, 1);
        salvarDados();
        renderClientes();
      }
    }

    function calcularTotal(compras) {
      return compras.reduce((sum, item) => sum + item.valor, 0);
    }

    function renderClientes(filtro = "") {
      const lista = document.getElementById("listaClientes");
      lista.innerHTML = "";
      clientes.forEach((cliente, cIndex) => {
        if (cliente.nome.toLowerCase().includes(filtro.toLowerCase())) {
          const div = document.createElement("div");
          div.className = "cliente";

          let html = `<h3>${cliente.nome}</h3>
                      <button class="btn-adicionar" onclick="adicionarCompra(${cIndex})">Adicionar Compra</button>
                      <button class="btn-editar" onclick="editarCliente(${cIndex})">Editar Cliente</button>
                      <button class="btn-apagar" onclick="apagarCliente(${cIndex})">Apagar Cliente</button>
                      <div class="compras">`;

          cliente.compras.forEach((item, iIndex) => {
            html += `<div class="item">
                       ${item.produto} - R$ ${item.valor.toFixed(2)}
                       <span>
                         <button onclick="editarCompra(${cIndex}, ${iIndex})">✏️</button>
                         <button onclick="removerCompra(${cIndex}, ${iIndex})">❌</button>
                       </span>
                     </div>`;
          });

          html += `</div>
                   <div class="total">Total: R$ ${calcularTotal(cliente.compras).toFixed(2)}</div>`;

          div.innerHTML = html;
          lista.appendChild(div);
        }
      });
    }

    function filtrarClientes() {
      const filtro = document.getElementById("pesquisaCliente").value;
      renderClientes(filtro);
    }

    function irParaCliente() {
      const nomeBusca = document.getElementById("pesquisaCliente").value.toLowerCase();
      if (!nomeBusca) return alert("Digite o nome do cliente para localizar!");
      
      const listaDivs = document.querySelectorAll(".cliente");
      let encontrado = false;

      listaDivs.forEach(div => {
        const h3 = div.querySelector("h3");
        if (h3.textContent.toLowerCase() === nomeBusca) {
          div.scrollIntoView({ behavior: "smooth", block: "center" });
          div.style.backgroundColor = "#ffff99"; // destaca temporariamente
          setTimeout(() => div.style.backgroundColor = "#fafafa", 2000);
          encontrado = true;
        }
      });

      if (!encontrado) {
        alert("Cliente não encontrado!");
      }
    }

    function exportarExcel() {
      if (clientes.length === 0) {
        alert("Não há dados para exportar!");
        return;
      }

      let dadosExcel = [];

      clientes.forEach(cliente => {
        if (cliente.compras.length > 0) {
          cliente.compras.forEach(item => {
            dadosExcel.push({
              Cliente: cliente.nome,
              Produto: item.produto,
              Valor: item.valor
            });
          });
          dadosExcel.push({
            Cliente: cliente.nome,
            Produto: "TOTAL",
            Valor: calcularTotal(cliente.compras)
          });
          dadosExcel.push({});
        } else {
          dadosExcel.push({
            Cliente: cliente.nome,
            Produto: "Nenhuma compra",
            Valor: 0
          });
        }
      });

      let wb = XLSX.utils.book_new();
      let ws = XLSX.utils.json_to_sheet(dadosExcel);
      XLSX.utils.book_append_sheet(wb, ws, "Caderneta");
      XLSX.writeFile(wb, "caderneta_fiado.xlsx");
    }

    window.onload = carregarDados;
  </script>
</body>
</html>
